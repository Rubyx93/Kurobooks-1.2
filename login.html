<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión ✨</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="contenedor login-box">
    <h1>🔐 Iniciar Sesión</h1>

    <input id="loginUser" type="text" placeholder="Usuario">
    <input id="loginPass" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <p>¿No tienes cuenta?  
        <a href="registro.html">💖 Regístrate aquí</a>
    </p>
</div>

<script>
function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let datos = JSON.parse(localStorage.getItem("usuarios")) || [];

    let existe = datos.find(u => u.user === user && u.pass === pass);

    if (existe) {
        localStorage.setItem("usuarioActual", user);
        window.location.href = "index.html";
    } else {
        alert("Usuario o contraseña incorrectos");
    }
}
</script>

</body>
</html>
