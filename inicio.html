<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta ✨</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="registro-contenedor">
    <h1>🌟 Crear Cuenta 🌟</h1>
    <p class="subtitulo">Bienvenido a KuroBooks, tu mundo mágico</p>

    <form onsubmit="return registrar()">
        <label for="usuario">Nombre de usuario</label>
        <input type="text" id="usuario" placeholder="Escribe tu usuario..." required>

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="Tu correo kawaii..." required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Crea una contraseña..." required>

        <label for="password2">Confirmar contraseña</label>
        <input type="password" id="password2" placeholder="Repite la contraseña..." required>

        <button type="submit">💖 Registrarse 💖</button>
    </form>

    <p class="login-link">
        ¿Ya tienes cuenta?
        <a href="login.html">Inicia sesión aquí ✨</a>
    </p>
</div>

<script>
function registrar() {
    const user = document.getElementById("usuario").value;
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    const pass2 = document.getElementById("password2").value;

    if (pass !== pass2) {
        alert("Las contraseñas no coinciden 💔");
        return false;
    }

    localStorage.setItem("usuario", user);
    localStorage.setItem("email", email);
    localStorage.setItem("password", pass);

    alert("Cuenta creada con éxito 💜");
    window.location.href = "login.html";
    return false;
}
</script>

</body>
<div class="barra-kawaii">
    <div class="logo-kawaii">🌸 KuroBooks</div>

    <div class="menu-kawaii">
        <a href="index.html">🏠 Inicio</a>
        <a href="libros.html">📚 Mis Libros</a>
        <a href="#" onclick="crearLibroDesdeBarra()">➕ Nuevo Libro</a>
    </div>
</div>

</html>
