<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro ✨</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="contenedor login-box">
    <h1>💖 Crear Cuenta</h1>

    <input id="regUser" type="text" placeholder="Usuario">
    <input id="regPass" type="password" placeholder="Contraseña">
    <input id="regPass2" type="password" placeholder="Repetir contraseña">

    <button onclick="registrar()">Registrarme</button>

    <p>¿Ya tienes cuenta?  
        <a href="login.html">🔐 Inicia sesión</a>
    </p>
</div>

<script>
function registrar() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;
    let pass2 = document.getElementById("regPass2").value;

    if (pass !== pass2) {
        alert("Las contraseñas no coinciden");
        return;
    }

    let datos = JSON.parse(localStorage.getItem("usuarios")) || [];

    if (datos.find(u => u.user === user)) {
        alert("Ese usuario ya existe");
        return;
    }

    datos.push({ user, pass });
    localStorage.setItem("usuarios", JSON.stringify(datos));

    alert("Cuenta creada con éxito 💖");
    window.location.href = "login.html";
}
</script>

</body>
</html>
<div class="barra-kawaii">
    <div class="logo-kawaii">🌸 KuroBooks</div>

    <div class="menu-kawaii" id="menuKawaii">
        <!-- Aquí se insertan los botones dinámicamente -->
    </div>
</div>
<script>
function actualizarMenu() {
    let usuario = localStorage.getItem("usuarioActual");
    let menu = document.getElementById("menuKawaii");

    if (!menu) return;

    if (usuario) {
        menu.innerHTML = `
            <a href="index.html">🏠 Inicio</a>
            <a href="libros.html">📚 Mis Libros</a>
            <span class="usuario-tag">💖 ${usuario}</span>
            <a href="#" onclick="logout()">🚪 Cerrar sesión</a>
        `;
    } else {
        menu.innerHTML = `
            <a href="index.html">🏠 Inicio</a>
            <a href="login.html">🔐 Login</a>
            <a href="registro.html">💖 Registro</a>
        `;
    }
}

function logout() {
    localStorage.removeItem("usuarioActual");
    window.location.href = "login.html";
}

actualizarMenu();
</script>
