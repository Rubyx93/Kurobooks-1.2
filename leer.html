<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Leer Libro ✨</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<!-- Barra kawaii -->
<div class="barra-kawaii">
    <div class="logo-kawaii">🌸 KuroBooks</div>

    <div class="menu-kawaii">
        <a href="index.html">🏠 Inicio</a>
        <a href="libros.html">📚 Mis Libros</a>
    </div>
</div>

<div class="contenedor">

    <!-- Título editable -->
    <h1>📖 <input id="tituloLibro" class="input-titulo"></h1>

    <!-- Portada -->
    <img id="portadaLibro" class="portada-libro" src="" alt="Portada">

    <hr>

    <!-- Lista de capítulos -->
    <h2>📑 Capítulos</h2>
    <div id="listaCapitulos" class="lista-capitulos"></div>

    <button onclick="nuevoCapitulo()">➕ Nuevo capítulo</button>

    <hr>

    <!-- Editor -->
    <h2 id="tituloCapitulo">Capítulo</h2>
    <textarea id="textoCapitulo" rows="12" placeholder="Escribe aquí..."></textarea>

    <button onclick="guardarTodo()">💖 Guardar cambios</button>
    <button onclick="volver()">⬅ Volver</button>

</div>

<script>
let libros = JSON.parse(localStorage.getItem("libros")) || [];
let idLibro = localStorage.getItem("libroActual");
let libro = libros[idLibro];

// Cargar datos del libro
document.getElementById("tituloLibro").value = libro.titulo;
document.getElementById("portadaLibro").src = libro.portada;

// Capítulo actual
let capActual = 0;

// Mostrar lista de capítulos
function cargarCapitulos() {
    let cont = document.getElementById("listaCapitulos");
    cont.innerHTML = "";

    libro.capitulos.forEach((cap, index) => {
        cont.innerHTML += `
            <div class="cap-card">
                <span onclick="abrirCapitulo(${index})">📘 ${cap.titulo}</span>
                <button onclick="renombrarCapitulo(${index})">✏️</button>
                <button onclick="eliminarCapitulo(${index})">
