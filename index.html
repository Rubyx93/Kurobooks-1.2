<!DOCTYPE html>

<body>

<div class="welcome-contenedor">
    <h1 class="titulo-kawaii">📚✨ Bienvenido a KuroBooks ✨📚</h1>
    <p class="subtitulo">Tu rincón mágico para crear historias kawaii</p>

    <div class="botones-welcome">
        <a href="libros.html" class="btn">📖 Ver mis libros</a>
        <button class="btn btn-secundario" onclick="crearPrimerLibro()">➕ Crear mi primer libro</button>
    </div>
</div>

<script>
// Crear el primer libro automáticamente si no existe ninguno
function crearPrimerLibro() {
    let libros = JSON.parse(localStorage.getItem("libros")) || [];

    if (libros.length === 0) {
        const nuevoLibro = {
            titulo: "Libro 1",
            portada: "https://i.imgur.com/8QfQZ5K.png",
            contenido: ""
        };

        libros.push(nuevoLibro);
        localStorage.setItem("libros", JSON.stringify(libros));
    }

    window.location.href = "libros.html";
}
</script>

</body>
<div class="barra-kawaii"> ... </div>
