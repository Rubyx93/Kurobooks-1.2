<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subir Portada ✨</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="registro-contenedor">
    <h1>📚 Subir Portada del Libro</h1>
    <p class="subtitulo">Añade una portada para tu nuevo libro</p>

    <form onsubmit="return guardarPortada()" enctype="multipart/form-data">
        <label>Título del libro</label>
        <input type="text" id="titulo" required>

        <label>Portada del libro</label>
        <input type="file" id="portada" accept="image/*" required>

        <button type="submit">✨ Guardar Portada ✨</button>
    </form>

    <p class="login-link">
        Ver mis libros:
        <a href="libros.html">📚 Ir a la biblioteca</a>
    </p>
</div>

<script>
function guardarPortada() {
    const titulo = document.getElementById("titulo").value;
    const archivo = document.getElementById("portada").files[0];

    const reader = new FileReader();
    reader.onload = function(e) {
        let libros = JSON.parse(localStorage.getItem("libros")) || [];

        libros.push({
            titulo: titulo,
            portada: e.target.result
        });

        localStorage.setItem("libros", JSON.stringify(libros));

        alert("Portada guardada 💖");
        window.location.href = "libros.html";
    };

    reader.readAsDataURL(archivo);
    return false;
}
</script>

</body>
</html>
