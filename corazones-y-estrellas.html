<script>

</script>

<div class="barra-estado">
    <span class="estado-texto">💖 Corazones y Estrellas ✨</span>

    <div class="estado-botones">
        <button onclick="toggleDarkMode()">🌙 Modo oscuro</button>
        <button onclick="logout()">🚪 Cerrar sesión</button>

<header>

<script>
function logout() {
    localStorage.setItem("logeado", "false");
    window.location.href = "login.html";
}
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>
<button onclick="toggleDarkMode()">🌙 Modo oscuro</button>
<script>
function toggleDarkMode() {
    const body = document.body;
    body.classList.toggle("dark-mode");

    // Guardar estado
    if (body.classList.contains("dark-mode")) {
        localStorage.setItem("modoOscuro", "true");
    } else {
        localStorage.setItem("modoOscuro", "false");
    }
}

// Activar automáticamente si estaba guardado
window.onload = function() {
    if (localStorage.getItem("modoOscuro") === "true") {
        document.body.classList.add("dark-mode");
    }
};
</script>

</html>
<div class="barra-kawaii">
    <div class="logo-kawaii">🌸 KuroBooks</div>

    <div class="menu-kawaii" id="menuKawaii">
        <!-- Aquí se insertan los botones dinámicamente -->
    </div>
</div>
<script>
function actualizarMenu() {
    let usuario = localStorage.getItem("usuarioActual");
    let menu = document.getElementById("menuKawaii");

    if (!menu) return;

    if (usuario) {
        menu.innerHTML = `
            <a href="index.html">🏠 Inicio</a>
            <a href="libros.html">📚 Mis Libros</a>
            <span class="usuario-tag">💖 ${usuario}</span>
            <a href="#" onclick="logout()">🚪 Cerrar sesión</a>
        `;
    } else {
        menu.innerHTML = `
            <a href="index.html">🏠 Inicio</a>
            <a href="login.html">🔐 Login</a>
            <a href="registro.html">💖 Registro</a>
        `;
    }
}

function logout() {
    localStorage.removeItem("usuarioActual");
    window.location.href = "login.html";
}

actualizarMenu();
</script>
