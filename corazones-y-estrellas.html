<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corazones y Estrellas ✨</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<script>
    if (localStorage.getItem("logeado") !== "true") {
        window.location.href = "login.html";
    }
</script>

<div class="barra-estado">
    <span class="estado-texto">💖 Corazones y Estrellas ✨</span>

    <div class="estado-botones">
        <button onclick="toggleDarkMode()">🌙 Modo oscuro</button>
        <button onclick="logout()">🚪 Cerrar sesión</button>
    </div>
</div>

<header>
    <h1>💖 Corazones y Estrellas ✨</h1>
    <p>Un libro lleno de magia, ternura y luz pastel.</p>
</header>

<section class="contenido">
    <h2>Capítulo 1 — Brillo en el Cielo</h2>
    <p>Aquí puedes escribir tu historia kawaii.</p>
</section>

<footer style="text-align:center; margin-top:40px;">
    <a href="index.html">⬅️ Volver a KuroBooks</a>
</footer>

<script>
function logout() {
    localStorage.setItem("logeado", "false");
    window.location.href = "login.html";
}
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>
<button onclick="toggleDarkMode()">🌙 Modo oscuro</button>
<script>
function toggleDarkMode() {
    const body = document.body;
    body.classList.toggle("dark-mode");

    // Guardar estado
    if (body.classList.contains("dark-mode")) {
        localStorage.setItem("modoOscuro", "true");
    } else {
        localStorage.setItem("modoOscuro", "false");
    }
}

// Activar automáticamente si estaba guardado
window.onload = function() {
    if (localStorage.getItem("modoOscuro") === "true") {
        document.body.classList.add("dark-mode");
    }
};
</script>

</body>
</html>
